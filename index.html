<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АА Казахстана</title>
    <link rel="apple-touch-icon" href="https://aaorg.kz/wp-content/uploads/2020/02/%D0%BB%D0%BE%D0%B3%D0%BE.png">
    <style>
        :root { --primary-color: #2B4F60; --accent-color: #F39C12; --bg-color: #F5F5F5; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg-color); min-height: 100vh; padding-bottom: 90px; }
        header { background: var(--primary-color); color: white; padding: 10px 0; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 1000; }
        .logo-container { background: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; border: 2px solid var(--accent-color); overflow: hidden; }
        .content-section { display: none; padding: 15px; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .active { display: flex !important; }

        /* Счетчик */
        .counter-card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 350px; margin-top: 10px; }
        .days-number { font-size: 72px; font-weight: 800; color: var(--primary-color); margin: 5px 0; }
        
        /* ПОЛЕ ВЫБОРА ДАТЫ */
        .date-input-group { margin-top: 20px; padding: 15px; border-top: 1px solid #eee; width: 100%; box-sizing: border-box; }
        .date-label { font-size: 13px; color: #7f8c8d; margin-bottom: 8px; display: block; }
        input[type="date"] { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid var(--primary-color); 
            border-radius: 10px; 
            font-size: 16px; 
            color: var(--primary-color);
            background: white;
            font-family: inherit;
        }

        .btn-reset { margin-top: 15px; background: none; border: none; color: #e74c3c; text-decoration: underline; font-size: 13px; cursor: pointer; }

        /* Навигация */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 70px; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #95a5a6; cursor: pointer; font-size: 12px; border: none; background: none; }
        .nav-item.active-nav { color: var(--primary-color); font-weight: bold; }
        .nav-item span { font-size: 24px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://aaorg.kz/wp-content/uploads/2020/02/%D0%BB%D0%BE%D0%B3%D0%BE.png" alt="Лого" style="width: 100%;">
        </div>
        <div style="font-size: 14px; font-weight: bold;">АА КАЗАХСТАНА</div>
    </header>

    <main id="tab-counter" class="content-section active">
        <div class="counter-card">
            <div style="color: #7f8c8d; font-size: 12px; letter-spacing: 1px;">ВЫ ТРЕЗВЫ</div>
            <div id="days-display" class="days-number">0</div>
            <div style="font-size: 18px; color: var(--primary-color); font-weight: 500;">ДНЕЙ</div>
            
            <div class="date-input-group">
                <label class="date-label">Установить дату начала трезвости:</label>
                <input type="date" id="sobriety-date-input" onchange="changeDate(this.value)">
                <button class="btn-reset" onclick="setToday()">Сбросить на сегодня</button>
            </div>
        </div>
    </main>

    <main id="tab-groups" class="content-section">
        <div style="width: 100%; max-width: 450px; text-align: center;">
            <p style="color: #7f8c8d;">Список групп загружается из базы данных...</p>
        </div>
        <div id="list-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active-nav" id="nav-counter" onclick="switchTab('counter')">
            <span>⏱</span>Счетчик
        </button>
        <button class="nav-item" id="nav-groups" onclick="switchTab('groups')">
            <span>📍</span>Группы
        </button>
    </nav>

    <script>
        function initCounter() {
            let savedDate = localStorage.getItem('aa_sobriety_date');
            // Если даты нет, ставим сегодня
            if (!savedDate) {
                savedDate = new Date().toISOString().split('T')[0];
                localStorage.setItem('aa_sobriety_date', savedDate);
            }
            document.getElementById('sobriety-date-input').value = savedDate;
            updateDisplay(savedDate);
        }

        function updateDisplay(dateString) {
            const start = new Date(dateString);
            const now = new Date();
            // Считаем разницу в днях
            const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
            document.getElementById('days-display').innerText = diff < 0 ? 0 : diff;
        }

        function changeDate(newDate) {
            localStorage.setItem('aa_sobriety_date', newDate);
            updateDisplay(newDate);
        }

        function setToday() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('sobriety-date-input').value = today;
            changeDate(today);
        }

        function switchTab(tab) {
            document.getElementById('tab-counter').classList.toggle('active', tab === 'counter');
            document.getElementById('tab-groups').classList.toggle('active', tab === 'groups');
            document.getElementById('nav-counter').classList.toggle('active-nav', tab === 'counter');
            document.getElementById('nav-groups').classList.toggle('active-nav', tab === 'groups');
        }

        // Запуск при загрузке
        initCounter();
    </script>
</body>
</html>
