<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АА Казахстана</title>
    <link rel="apple-touch-icon" href="https://aaorg.kz/wp-content/uploads/2020/02/%D0%BB%D0%BE%D0%B3%D0%BE.png">
    <style>
        :root { --primary-color: #2B4F60; --accent-color: #F39C12; --bg-color: #F5F5F5; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg-color); min-height: 100vh; padding-bottom: 90px; }
        
        header { background: var(--primary-color); color: white; padding: 10px 0; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 1000; }
        .logo-container { background: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; border: 2px solid var(--accent-color); overflow: hidden; }
        
        .content-section { display: none; padding: 15px; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .active { display: flex !important; }

        .counter-card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 350px; margin-top: 10px; }
        .days-number { font-size: 72px; font-weight: 800; color: var(--primary-color); margin: 5px 0; }
        
        .filter-container { width: 100%; max-width: 450px; margin-bottom: 15px; position: sticky; top: 85px; z-index: 900; background: var(--bg-color); padding: 5px 0; }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--primary-color); font-size: 16px; background: white; }

        .group-card { background: white; width: 100%; max-width: 450px; margin-bottom: 12px; padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid var(--primary-color); box-sizing: border-box; }
        .city-tag { font-size: 11px; color: var(--accent-color); font-weight: bold; margin-bottom: 4px; text-transform: uppercase; }
        .group-name { font-weight: bold; color: var(--primary-color); font-size: 17px; margin-bottom: 8px; }
        .info-row { font-size: 13px; color: #444; margin-bottom: 6px; display: flex; align-items: flex-start; }
        .info-row span { margin-right: 8px; flex-shrink: 0; }
        .phone-link { color: var(--primary-color); text-decoration: none; font-weight: bold; }
        .link-btn { display: inline-block; background: var(--primary-color); color: white; padding: 5px 10px; border-radius: 5px; text-decoration: none; margin-top: 5px; font-size: 12px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 70px; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #95a5a6; cursor: pointer; font-size: 12px; border: none; background: none; }
        .nav-item.active-nav { color: var(--primary-color); font-weight: bold; }
        .nav-item span { font-size: 24px; margin-bottom: 2px; }
    </style>
</head>
<body>

            <div id="days-display" class="days-number">0</div>
            <div style="font-size: 20px; color: var(--primary-color); font-weight: 500;">ДНЕЙ</div>
            <button onclick="resetDays()" style="margin-top:25px; width:100%; padding:10px; border:1px solid #e74c3c; color:#e74c3c; background:none; border-radius:10px; font-weight:bold;">СБРОСИТЬ</button>

    </main>

        <div id="list-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </main>

        function switchTab(t) {
            document.getElementById('tab-counter').classList.toggle('active', t==='counter');
            document.getElementById('tab-groups').classList.toggle('active', t==='groups');
            document.getElementById('nav-counter').classList.toggle('active-nav', t==='counter');
            document.getElementById('nav-groups').classList.toggle('active-nav', t==='groups');
            if(t==='groups') applyFilter();
            window.scrollTo(0,0);
        }

        function applyFilter() {
            const city = document.getElementById('citySelect').value;
            const container = document.getElementById('list-container');
            container.innerHTML = "";
            groups.forEach(g => {
                if (city === "all" || g.c === city) {
                    container.innerHTML += `
                        <div class="group-card">
                            <div class="city-tag">${g.c}</div>
                            <div class="group-name">${g.n}</div>
                            <div class="info-row"><span>📍</span>${g.a}</div>
                            <div class="info-row"><span>⏰</span>${g.t}</div>
                            ${g.p ? `<div class="info-row"><span>📞</span><a href="tel:${g.p.replace(/[^0-9+]/g,'')}" class="phone-link">${g.p}</a></div>` : ''}
                            ${g.l ? `<a href="${g.l}" class="link-btn" target="_blank">🔗 Перейти в Zoom/Чат</a>` : ''}
                        </div>`;
                }
            });
        }

        function updateDays() {
            let s = localStorage.getItem('aa_start_date') || new Date().toISOString();
            if(!localStorage.getItem('aa_start_date')) localStorage.setItem('aa_start_date', s);
            document.getElementById('days-display').innerText = Math.floor((new Date() - new Date(s)) / 86400000);
        }

        function resetDays() { if(confirm("Начать заново?")) { localStorage.setItem('aa_start_date', new Date().toISOString()); updateDays(); } }
        
        updateDays();
    </script>
</body>
</html>
