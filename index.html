<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АА Казахстана</title>
    <link rel="apple-touch-icon" href="https://aaorg.kz/wp-content/uploads/2020/02/%D0%BB%D0%BE%D0%B3%D0%BE.png">
    <style>
        :root { --primary-color: #2B4F60; --accent-color: #F39C12; --bg-color: #F5F5F5; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg-color); min-height: 100vh; padding-bottom: 90px; }
        header { background: var(--primary-color); color: white; padding: 10px 0; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 1000; }
        .logo-container { background: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; border: 2px solid var(--accent-color); overflow: hidden; }
        .content-section { display: none; padding: 15px; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .active { display: flex !important; }

        /* Счетчик */
        .counter-card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 350px; margin-top: 10px; }
        .days-number { font-size: 72px; font-weight: 800; color: var(--primary-color); margin: 5px 0; }
        .date-input-container { margin-top: 20px; width: 100%; }
        input[type="date"] { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid var(--primary-color); font-size: 16px; background: #fff; box-sizing: border-box; }

        /* Группы */
        .filter-container { width: 100%; max-width: 450px; margin-bottom: 15px; position: sticky; top: 85px; z-index: 900; background: var(--bg-color); padding: 5px 0; }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--primary-color); font-size: 16px; background: white; }
        .group-card { background: white; width: 100%; max-width: 450px; margin-bottom: 12px; padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid var(--primary-color); box-sizing: border-box; text-align: left; }
        .city-tag { font-size: 11px; color: var(--accent-color); font-weight: bold; text-transform: uppercase; }
        .group-name { font-weight: bold; color: var(--primary-color); font-size: 17px; margin: 5px 0; }
        .info-row { font-size: 13px; color: #444; margin-bottom: 4px; }
        .phone-link { color: var(--primary-color); font-weight: bold; text-decoration: none; }

        /* Меню */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 70px; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #95a5a6; cursor: pointer; font-size: 12px; border: none; background: none; }
        .nav-item.active-nav { color: var(--primary-color); font-weight: bold; }
        .nav-item span { font-size: 24px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://aaorg.kz/wp-content/uploads/2020/02/%D0%BB%D0%BE%D0%B3%D0%BE.png" alt="Лого" style="width: 100%;">
        </div>
        <div style="font-size: 14px; font-weight: bold;">АА КАЗАХСТАНА</div>
    </header>

    <main id="tab-counter" class="content-section active">
        <div class="counter-card">
            <div style="color: #7f8c8d; font-size: 12px; letter-spacing: 1px;">ДНЕЙ В ТРЕЗВОСТИ</div>
            <div id="days-display" class="days-number">0</div>
            <div class="date-input-container">
                <label style="font-size: 12px; color:#7f8c8d; display:block; margin-bottom:5px;">Укажите дату начала:</label>
                <input type="date" id="sobriety-date-input" onchange="updateDate(this.value)">
            </div>
            <button onclick="resetToday()" style="margin-top:15px; color:#e74c3c; border:none; background:none; text-decoration:underline; font-size:12px;">Сбросить на сегодня</button>
        </div>
    </main>

    <main id="tab-groups" class="content-section">
        <div class="filter-container">
            <select id="citySelect" onchange="renderGroups()">
                <option value="all">Все города</option>
                <option value="Алматы">Алматы</option>
                <option value="Астана">Астана</option>
                <option value="Шымкент">Шымкент</option>
                <option value="Онлайн">Онлайн</option>
                <option value="Костанай">Костанай</option>
                <option value="Павлодар">Павлодар</option>
                <option value="другие">Другие города</option>
            </select>
        </div>
        <div id="list-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active-nav" id="nav-counter" onclick="switchTab('counter')"><span>⏱</span>Счетчик</button>
        <button class="nav-item" id="nav-groups" onclick="switchTab('groups')"><span>📍</span>Группы</button>
    </nav>

    <script>
        // ДАННЫЕ ГРУПП (Весь ваш список)
        const allGroups = [
            { c: "Онлайн", n: "АА «Пробуждение»", a: "Zoom ID: 82036099070", t: "Вт, Чт, Сб: 21:00", p: "+77772329996" },
            { c: "Алматы", n: "АА «Виктория»", a: "ул. Жубанова 3а, каб. 301", t: "Вт, Чт: 19:30, Сб: 19:00", p: "+77059907938" },
            { c: "Алматы", n: "АА «8 марта»", a: "ул. Зенкова 24", t: "Ежедневно: 19:00", p: "+77011218501" },
            { c: "Астана", n: "АА «51 параллель»", a: "ул. Петрова 14/3", t: "Ср: 19:00, Сб: 15:00", p: "+77718993679" },
            { c: "Шымкент", n: "АА «Юг»", a: "Шаяхметова 14/1", t: "Пн, Ср, Пт: 19:00", p: "+77016749853" },
            { c: "Костанай", n: "АА «ДОСТАР»", a: "ул. 5 апреля 67", t: "Пн, Ср, Пт: 19:00", p: "+77777435620" },
            { c: "Павлодар", n: "АА «Крепость»", a: "ул. Торайгырова 10/1", t: "Пн, Ср, Пт: 19:00", p: "+77086361510" },
            { c: "Актобе", n: "АА «ОАЗИС»", a: "ул. Абулхаир–Хана 1", t: "Вт, Чт: 19:00", p: "+77476845424" }
            // Можно дописать остальные города сюда по аналогии
        ];

        // ЛОГИКА СЧЕТЧИКА
        function initApp() {
            let saved = localStorage.getItem('aa_date');
            if(!saved) {
                saved = new Date().toISOString().split('T')[0];
                localStorage.setItem('aa_date', saved);
            }
            document.getElementById('sobriety-date-input').value = saved;
            calc(saved);
        }

        function calc(dateStr) {
            const start = new Date(dateStr);
            start.setHours(0,0,0,0);
            const today = new Date();
            today.setHours(0,0,0,0);
            const days = Math.floor((today - start) / 86400000);
            document.getElementById('days-display').innerText = days < 0 ? 0 : days;
        }

        function updateDate(val) {
            localStorage.setItem('aa_date', val);
            calc(val);
        }

        function resetToday() {
            const t = new Date().toISOString().split('T')[0];
            document.getElementById('sobriety-date-input').value = t;
            updateDate(t);
        }

        // НАВИГАЦИЯ
        function switchTab(tab) {
            document.getElementById('tab-counter').classList.toggle('active', tab==='counter');
            document.getElementById('tab-groups').classList.toggle('active', tab==='groups');
            document.getElementById('nav-counter').classList.toggle('active-nav', tab==='counter');
            document.getElementById('nav-groups').classList.toggle('active-nav', tab==='groups');
            if(tab==='groups') renderGroups();
        }

        function renderGroups() {
            const filter = document.getElementById('citySelect').value;
            const container = document.getElementById('list-container');
            container.innerHTML = "";
            allGroups.forEach(g => {
                if(filter === 'all' || g.c === filter || (filter === 'другие' && !['Алматы','Астана','Шымкент','Онлайн'].includes(g.c))) {
                    container.innerHTML += `
                        <div class="group-card">
                            <div class="city-tag">${g.c}</div>
                            <div class="group-name">${g.n}</div>
                            <div class="info-row">📍 ${g.a}</div>
                            <div class="info-row">⏰ ${g.t}</div>
                            <div class="info-row">📞 <a href="tel:${g.p}" class="phone-link">${g.p}</a></div>
                        </div>
                    `;
                }
            });
        }

        initApp();
    </script>
</body>
</html>
