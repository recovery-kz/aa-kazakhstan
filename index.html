<head>
    <meta charset="UTF-8">

    <title>АА Казахстана</title>
    <link rel="apple-touch-icon" href="https://aaorg.kz/wp-content/uploads/2020/02/%D0%BB%D0%BE%D0%B3%D0%BE.png">
    <style>
        :root { --primary: #2B4F60; --accent: #F39C12; --bg: #F5F5F5; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); min-height: 100vh; padding-bottom: 90px; }
        header { background: var(--primary); color: white; padding: 15px 0; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .content-section { display: none; padding: 15px; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .active { display: flex !important; }
        .counter-card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; width: 100%; max-width: 350px; margin-top: 10px; }
        .days-number { font-size: 80px; font-weight: 800; color: var(--primary); margin: 0; }
        .days-label { font-size: 18px; color: var(--primary); font-weight: 600; margin-bottom: 20px; }
        input[type="date"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; color: var(--primary); }
        .filter-box { width: 100%; max-width: 450px; margin-bottom: 15px; position: sticky; top: 75px; z-index: 900; background: var(--bg); padding: 10px 0; }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--primary); font-size: 16px; background: white; }
        .group-card { background: white; width: 100%; max-width: 450px; margin-bottom: 12px; padding: 15px; border-radius: 15px; border-left: 6px solid var(--primary); box-sizing: border-box; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .city-tag { font-size: 10px; color: var(--accent); font-weight: 700; text-transform: uppercase; }
        .group-name { font-weight: 700; color: var(--primary); font-size: 17px; margin: 4px 0; line-height: 1.2; }
        .info-row { font-size: 13px; color: #444; margin-bottom: 4px; }
        .phone-link { color: var(--primary); font-weight: bold; text-decoration: none; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 75px; box-shadow: 0 -4px 15px rgba(0,0,0,0.08); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #bdc3c7; cursor: pointer; border: none; background: none; font-size: 12px; }
        .nav-item.active-nav { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>

<header><div style="font-weight: 800;">АА КАЗАХСТАНА</div></header>

<div id="tab-counter" class="content-section active">
    <div class="counter-card">
        <div style="color: #95a5a6; font-size: 12px; font-weight: 600;">МОЯ ТРЕЗВОСТЬ</div>
        <div id="days-display" class="days-number">0</div>
        <div class="days-label">ДНЕЙ</div>
        <div style="border-top: 1px solid #eee; padding-top: 15px;">
            <label style="font-size: 11px; color: #999; display: block; margin-bottom: 5px;">ДАТА НАЧАЛА:</label>
            <input type="date" id="date-input" onchange="updateDate(this.value)">
        </div>
    </div>
</div>

<div id="tab-groups" class="content-section">
    <div class="filter-box">
        <select id="citySelect" onchange="render()"></select>
    </div>
    <div id="list-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<nav class="bottom-nav">
    <button class="nav-item active-nav" id="btn-c" onclick="goTo('counter')">⏱<br>Счетчик</button>
    <button class="nav-item" id="btn-g" onclick="goTo('groups')">📍<br>Группы</button>

    function goTo(tab) {
        document.getElementById('tab-counter').classList.toggle('active', tab === 'counter');
        document.getElementById('tab-groups').classList.toggle('active', tab === 'groups');
        document.getElementById('btn-c').classList.toggle('active-nav', tab === 'counter');
        document.getElementById('btn-g').classList.toggle('active-nav', tab === 'groups');
        if(tab === 'groups') render();
    }

    function updateDate(val) {
        localStorage.setItem('aa_date_vFinal', val);
        const diff = Math.floor((new Date() - new Date(val)) / 86400000);
        document.getElementById('days-display').innerText = diff < 0 ? 0 : diff;
    }

    function render() {
        const filter = document.getElementById('citySelect').value;
        const cont = document.getElementById('list-container');
        cont.innerHTML = "";
        data.forEach(g => {
            if(filter === 'all' || g.c === filter) {
                cont.innerHTML += `<div class="group-card">
                    <div class="city-tag">${g.c}</div>
                    <div class="group-name">${g.n}</div>
                    <div class="info-row">📍 ${g.a}</div>
                    <div class="info-row">⏰ ${g.t}</div>
                    ${g.p ? `<div class="info-row">📞 <a href="tel:${g.p}" class="phone-link">${g.p}</a></div>` : ''}
                </div>`;
            }
        });
    }

    // Инициализация городов
    const select = document.getElementById('citySelect');
    const cities = ["all", ...new Set(data.map(g => g.c))].sort();
    cities.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.innerText = c === "all" ? "Все города и Онлайн" : c;
        select.appendChild(opt);
    });

    let s = localStorage.getItem('aa_date_vFinal') || new Date().toISOString().split('T')[0];
    document.getElementById('date-input').value = s;
    updateDate(s);
</script>

</html>
