<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АА Казахстана</title>
    <style>
        :root { --primary: #2B4F60; --accent: #F39C12; --bg: #F5F5F5; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); padding-bottom: 90px; }
        header { background: var(--primary); color: white; padding: 15px 0; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .content-section { display: none; padding: 15px; flex-direction: column; align-items: center; }
        .active { display: flex !important; }

        /* Счетчик */
        .counter-card { background: white; padding: 35px 20px; border-radius: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; width: 100%; max-width: 350px; margin-top: 20px; box-sizing: border-box; }
        .days-number { font-size: 80px; font-weight: 800; color: var(--primary); margin: 0; line-height: 1; }
        .days-label { font-size: 20px; color: var(--primary); font-weight: 600; margin-bottom: 25px; letter-spacing: 1px; }
        .date-settings { border-top: 1px solid #eee; width: 100%; margin-top: 20px; padding-top: 20px; }
        .date-settings label { font-size: 11px; color: #999; display: block; margin-bottom: 8px; text-transform: uppercase; }
        input[type="date"] { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; color: var(--primary); background: #fafafa; }

        /* Список групп */
        .filter-box { width: 100%; max-width: 450px; margin-bottom: 15px; position: sticky; top: 85px; z-index: 900; background: var(--bg); padding: 5px 0; }
        select { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid var(--primary); font-size: 16px; background: white; }
        .group-card { background: white; width: 100%; max-width: 450px; margin-bottom: 12px; padding: 18px; border-radius: 18px; border-left: 6px solid var(--primary); box-sizing: border-box; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .city-tag { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .group-name { font-weight: 700; color: var(--primary); font-size: 17px; margin-bottom: 8px; line-height: 1.3; }
        .info-row { font-size: 13px; color: #444; margin-bottom: 6px; display: flex; align-items: flex-start; }
        .info-row span { margin-right: 8px; }
        .phone-link { color: var(--primary); font-weight: 700; text-decoration: none; }

        /* Навигация */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 75px; box-shadow: 0 -4px 15px rgba(0,0,0,0.08); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #bdc3c7; cursor: pointer; font-size: 12px; border: none; background: none; }
        .nav-item.active-nav { color: var(--primary); font-weight: 700; }
        .nav-item span { font-size: 26px; margin-bottom: 4px; }
    </style>
</head>
