<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АА Казахстана</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="АА КАЗ">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2B4F60">
    
    <link rel="apple-touch-icon" href="https://aaorg.kz/wp-content/uploads/2020/02/%D0%BB%D0%BE%D0%B3%D0%BE.png">
    <link rel="icon" href="https://aaorg.kz/wp-content/uploads/2020/02/%D0%BB%D0%BE%D0%B3%D0%BE.png">

    <style>
        :root { --primary: #2B4F60; --accent: #F39C12; --bg: #F5F5F5; --sos: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden;
        }

        /* Добавляем безопасный отступ для iPhone с "челкой" */
        header { 
            background: var(--primary); 
            color: white; 
            padding: 20px 0 15px 0; 
            text-align: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            width: 100%;
            padding-top: env(safe-area-inset-top);
        }

        .header-logo { width: 45px; height: 45px; margin-bottom: 5px; object-fit: contain; }
        .header-title { font-weight: 800; letter-spacing: 1px; font-size: 16px; text-transform: uppercase; }

        .main-container { flex: 1; padding: 15px 15px 100px 15px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .content-section { display: none; width: 100%; max-width: 500px; flex-direction: column; align-items: center; }
        .active { display: flex !important; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Стили карточек (оставляем как были) */
        .motivation-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid var(--accent); margin-bottom: 15px; width: 100%; text-align: left; }
        .mot-label { color: var(--accent); font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .mot-text { color: #333; font-size: 15px; line-height: 1.4; font-weight: 600; font-style: italic; }

        .counter-card { background: white; padding: 35px 20px; border-radius: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; width: 100%; }
        .days-number { font-size: 80px; font-weight: 800; color: var(--primary); margin: 0; line-height: 1; }
        .days-label { font-size: 18px; color: var(--primary); font-weight: 600; margin-bottom: 25px; }

        .date-settings { border-top: 1px solid #eee; width: 100%; margin-top: 15px; padding-top: 20px; }
        input[type="date"] { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; margin-bottom: 15px; background: #fafafa; outline: none; }
        .btn-relapse { background: #fceae8; color: var(--sos); border: 1px solid var(--sos); padding: 14px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-relapse:active { background: var(--sos); color: white; }

        /* Навигация (с учетом безопасной зоны внизу для новых iPhone) */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: white; 
            display: flex; 
            height: 85px; 
            box-shadow: 0 -4px 15px rgba(0,0,0,0.08); 
            z-index: 2000; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #bdc3c7; cursor: pointer; border: none; background: none; font-size: 11px; }
        .nav-item.active-nav { color: var(--primary); font-weight: 700; }
        .nav-item span { font-size: 24px; margin-bottom: 4px; }

        /* Остальные стили групп и SOS... */
        .filter-box { width: 100%; margin-bottom: 15px; position: sticky; top: 95px; z-index: 900; background: var(--bg); padding: 5px 0; }
        select { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid var(--primary); font-size: 16px; background: white; }
        .group-card { background: white; width: 100%; margin-bottom: 12px; padding: 18px; border-radius: 18px; border-left: 6px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: left; }
        .city-tag { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; }
        .group-name { font-weight: 700; color: var(--primary); font-size: 17px; margin: 4px 0; }
        .info-row { font-size: 13px; color: #444; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 8px; }
        .phone-link { color: var(--primary); font-weight: 700; text-decoration: none; }
        .sos-card { background: white; padding: 30px 20px; border-radius: 25px; text-align: center; width: 100%; border: 2px solid var(--sos); }
        .sos-btn { display: block; background: var(--sos); color: white; text-decoration: none; padding: 18px; border-radius: 15px; margin: 15px 0; font-weight: 700; font-size: 18px; }
        .sos-btn span { display: block; font-size: 12px; font-weight: 400; margin-top: 4px; opacity: 0.9; }
    </style>
</head>
<body>

<header>
    <img src="https://aaorg.kz/wp-content/uploads/2020/02/%D0%BB%D0%BE%D0%B3%D0%BE.png" alt="Лого" class="header-logo">
    <div class="header-title">АА КАЗАХСТАНА</div>
</header>

<main class="main-container">
    <div id="tab-counter" class="content-section active">
        <div class="motivation-card">
            <div class="mot-label">Мотивация на сегодня</div>
            <div class="mot-text" id="mot-text">Загрузка...</div>
        </div>
        <div class="counter-card">
            <div style="color: #95a5a6; font-size: 12px; font-weight: 600; letter-spacing: 1px; margin-bottom: 10px;">МОЯ ТРЕЗВОСТЬ</div>
            <div id="days-display" class="days-number">0</div>
            <div class="days-label">ДНЕЙ</div>
            <div class="date-settings">
                <input type="date" id="date-input" onchange="updateDate(this.value)">
                <button class="btn-relapse" onclick="confirmRelapse()">Я СОРВАЛСЯ</button>
            </div>
        </div>
    </div>

    <div id="tab-groups" class="content-section">
        <div class="filter-box"><select id="citySelect" onchange="render()"></select></div>
        <div id="list-container" style="width: 100%;"></div>
    </div>

    <div id="tab-sos" class="content-section">
        <div class="sos-card">
            <div style="color: var(--sos); font-weight: 800; font-size: 24px; margin-bottom: 10px;">НУЖНА ПОМОЩЬ?</div>
            <p style="font-size: 14px; color: #7f8c8d;">Если тебе плохо или ты на грани срыва — просто позвони. Тебя выслушают.</p>
            <a href="tel:+77072080553" class="sos-btn">+7 (707) 208-05-53 <span>ГОРЯЧАЯ ЛИНИЯ (РУС)</span></a>
            <a href="tel:+77074337408" class="sos-btn" style="background: #34495e;">+7 (707) 433-74-08 <span>ГОРЯЧАЯ ЛИНИЯ (КАЗ)</span></a>
        </div>
    </div>
</main>

<nav class="bottom-nav">
    <button class="nav-item active-nav" id="btn-c" onclick="goTo('counter')"><span>⏱</span>Счетчик</button>
    <button class="nav-item" id="btn-g" onclick="goTo('groups')"><span>📍</span>Группы</button>
    <button class="nav-item" id="btn-s" onclick="goTo('sos')"><span>🚨</span>SOS</button>
</nav>

<script>
    // Массив фраз и данные групп оставляем без изменений (все 46 групп на месте)
    const phrases = ["Главное — не пить только сегодня.", "Живи и давай жить другим.", "Первым делом — главное.", "Это тоже пройдет.", "Тише едешь — дальше будешь.", "Боже, дай мне разум и душевный покой...", "Обида — это яд, который мы пьем сами.", "Программа АА — это программа действий.", "Смирение — это путь к свободе.", "Благодарное сердце не пьет.", "Мы не старые люди, пытающиеся стать молодыми. Мы больные люди, пытающиеся выздороветь.", "Ищи сходства, а не различия.", "Доверься Богу, чисти кухню.", "Принятие — ключ ко всем моим проблемам.", "Ничего не меняется, если я ничего не меняю.", "Трезвость — это дар, который нужно беречь каждый день.", "Помогая другому, ты помогаешь себе.", "У нас нет проблем, которые нельзя было бы решить с помощью 12 Шагов.", "Один день за один раз.", "Просто начни с начала.", "Вчера — это история, завтра — тайна, сегодня — дар.", "Будь честен с самим собой.", "Нам не нужно бороться с алкоголем. Нам нужно научиться жить без него.", "Твоя Высшая Сила любит тебя.", "Делай то, что должен, и будь что будет.", "Принципы выше личностей.", "Сначала надень маску на себя.", "Трезвость — это не конец пути, а начало новой жизни.", "Перестань пытаться управлять вселенной.", "Бог делает для нас то, что мы не можем сделать для себя сами.", "Единственное условие — желание бросить пить.", "Мы — не святые. Мы люди, ищущие духовного прогресса.", "Смотри в зеркало, а не в окно.", "Трезвость — это свобода быть собой.", "Не анализируй — действуй.", "Держись поближе к победителям.", "Твое дно — это фундамент новой жизни.", "Не сравнивай свое «внутри» с чьим-то «снаружи».", "Молитва не меняет Бога, она меняет меня.", "Вера — это смелость рискнуть."];

    const data = [{c:"Онлайн",n:"АА «Пробуждение»",a:"Zoom ID: 82036099070",t:"Вт, Чт, Сб: 21:00",p:"+77772329996"},{c:"Онлайн",n:"АА «Бірлік» (каз)",a:"Zoom ID: 5204364841",t:"Ср: 21:00",p:"+77074337408"},{c:"Онлайн",n:"АА «ШАГ ЗА ШАГОМ»",a:"Telegram чат",t:"Вт: 19:00",p:""},{c:"Алматы",n:"АА «Виктория»",a:"ул. Жубанова 3а, каб. 301",t:"Вт, Чт: 19:30, Сб: 19:00",p:"+77059907938"},{c:"Алматы",n:"АА «8 марта»",a:"ул. Зенкова 24",t:"Ежедневно: 19:00",p:"+77011218501"},{c:"Алматы",n:"АА «Турксиб»",a:"уточнять по номеру",t:"Вт, Чт: 19:00",p:"+77478601105"},{c:"Алматы",n:"АА женская «АлмА»",a:"ул. Зенкова 24",t:"Суббота: 12:00",p:"+77755006846"},{c:"Алматы",n:"АА «Шапагат» (каз)",a:"ул. Жубанова 3а",t:"Пн, Ср: 19:00",p:"+77471652435"},{c:"Алматы",n:"АА «Друзья Билла»",a:"ул. Жибек Жолы 64/47",t:"Вт, Чт: 12:00",p:"+77475637587"},{c:"Алматы",n:"АА «Чайхана» (новички)",a:"ул. Жубанова 3а",t:"Вс: 11:00",p:"+77059907938"},{c:"Алматы",n:"АА «Аксай»",a:"пр. Райымбека 493",t:"Вс: 13:00",p:"+77764533418"},{c:"Алматы",n:"АА «Наурыз»",a:"ул. Тимирязева 42",t:"Вт, Чт, Пт, Сб: 19:00",p:"+77083171769"},{c:"Алматы",n:"АА «Женский клуб»",a:"ул. Жубанова 3а / Zoom",t:"Вс: 13:00",p:"+77055730900"},{c:"Алматы",n:"АА «Новые очки»",a:"ул. Жибек Жолы 64/47",t:"Пн, Ср, Пт: 19:00",p:"+77073084757"},{c:"Алматы",n:"АА «Боралдай»",a:"ул. Курчатова 13а",t:"Сб: 17:00",p:"+77772819098"},{c:"Алматы",n:"Мужская группа «ААА»",a:"ул. Зенкова 24",t:"Сб: 17:00",p:"+77713709966"},{c:"Астана",n:"АА «51 параллель»",a:"ул. Петрова 14/3",t:"Ср: 19:00, Сб: 15:00",p:"+77718993679"},{c:"Астана",n:"АА «Свобода»",a:"ул. Петрова 14/3",t:"Пн, Чт, Пт: 19:00",p:"+77071234699"},{c:"Астана",n:"АА «Есиль» (каз)",a:"ул. Петрова 14/3",t:"Вс: 17:00",p:"+77753601528"},{c:"Астана",n:"АА «Большая перемена»",a:"ул. Дукенулы 26",t:"Пн, Пт: 19:00",p:"+77071234699"},{c:"Астана",n:"АА «Сана»",a:"пр. Кабанбай Батыра 58А",t:"Вт, Чт: 20:00",p:"+77718993679"},{c:"Астана",n:"АА «Путь»",a:"ул. Ташенова 26",t:"Вт, Ср, Чт: 19:00",p:"+77718993679"},{c:"Астана",n:"АА «Возрождение»",a:"ул. Куйши Дина 27",t:"Вт: 19:00",p:"+77075650586"},{c:"Астана",n:"АА «Гармония»",a:"ул. Арасан 2/2",t:"Пн, Пт: 19:15",p:"+77753601528"},{c:"Астана",n:"АА «Үміт» (каз)",a:"ул. Кудайбердиулы 94",t:"Ср: 19:00",p:"+77074337408"},{c:"Актау",n:"АА «Парус»",a:"29-й мкр, дом 218",t:"Пн, Пт: 19:15",p:"+77770655797"},{c:"Актобе",n:"АА «ОАЗИС»",a:"ул. Абулхаир–Хана 1",t:"Вт, Чт: 19:00",p:"+77476845424"},{c:"Атырау",n:"АА «НАЧАЛО»",a:"мкр. Авангард-3",t:"Вт, Чт: 19:00",p:"+77054492468"},{c:"Караганда",n:"АА «Решение есть»",a:"ул. Ерубаева 34",t:"Сб: 15:45",p:"+77007656935"},{c:"Кокшетау",n:"АА «Синегорье»",a:"ул. Ауельбекова 127",t:"Вт, Пт: 19:30",p:"+77713630302"},{c:"Конаев",n:"АА «Надежда»",a:"18 мкр, ул. Курылысшы 8а",t:"Ср: 19:00",p:"+77781661081"},{c:"Костанай",n:"АА «ДОСТАР»",a:"ул. 5 апреля 67",t:"Пн, Ср, Пт: 19:00",p:"+77777435620"},{c:"Костанай",n:"АА «12 Шаг»",a:"ул. Арыстанбекова 23",t:"Вт, Чт, Вс: 19:00",p:"+77777435620"},{c:"Павлодар",n:"АА «Крепость»",a:"ул. Торайгырова 10/1",t:"Пн, Ср, Пт: 19:00",p:"+77086361510"},{c:"Петропавловск",n:"АА «Последняя капля»",a:"ул. Букетова 4",t:"Сб: 20:00",p:"+77758272514"},{c:"Рудный",n:"АА «Новая свобода»",a:"ул. Парковая 55",t:"Ср, Вс: 19:30",p:"+77754947917"},{c:"Семей",n:"АА «СЕМЁРОЧКА»",a:"инфо по тел.",t:"По запросу",p:"+77076400913"},{c:"Талдыкурган",n:"АА «жетысу»",a:"ул. Шевченко 100",t:"Пн, Ср, Пт: 19:00",p:"+77079928240"},{c:"Усть-Каменогорск",n:"АА «УСТЬЕ»",a:"ул. Казахстан 99",t:"Пн, Ср: 18:00",p:"+77777495088"},{c:"Кызылорда",n:"АА «сырдарья»",a:"ул. Муратбаева 8б",t:"Вт, Чт: 19:00",p:"+77074337408"},{c:"Шымкент",n:"АА «Юг»",a:"Шаяхметова 14/1",t:"Пн, Ср, Пт: 19:00",p:"+77016749853"},{c:"Шымкент",n:"АА «Шым»",a:"ул. Мангельдина 33",t:"Вт, Чт: 19:00",p:"+77026372329"},{c:"Шымкент",n:"АА «СВОБОДА»",a:"ул. Московская 9а",t:"Вс: 13:00",p:"+77059906737"},{c:"Шымкент",n:"АА «ПАНА» (каз)",a:"Шаяхметова 14/1",t:"Вс: 13:00",p:"+77026372329"},{c:"Экибастуз",n:"АА «Чистое Небо»",a:"инфо по тел.",t:"По запросу",p:"+77753500562"},{c:"Жетысай",n:"АА «куат»",a:"ул. Ауэзова, каб 12",t:"Пн, Ср, Пт: 19:00",p:"+77073183839"}];

    function showMotivation() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const diff = now - start;
        const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
        const index = dayOfYear % phrases.length;
        document.getElementById('mot-text').innerText = phrases[index];
    }

    function goTo(tab) {
        ['tab-counter','tab-groups','tab-sos'].forEach(t => document.getElementById(t).classList.toggle('active', t === `tab-${tab}`));
        ['btn-c','btn-g','btn-s'].forEach(b => document.getElementById(b).classList.toggle('active-nav', b === `btn-${tab[0]}`));
        if(tab === 'groups') render();
        window.scrollTo(0,0);
    }

    function updateDate(val) {
        if(!val) return;
        localStorage.setItem('aa_sober_v3', val);
        const start = new Date(val); start.setHours(0,0,0,0);
        const now = new Date(); now.setHours(0,0,0,0);
        const diff = Math.floor((now - start) / 86400000);
        document.getElementById('days-display').innerText = diff < 0 ? 0 : diff;
    }

    function confirmRelapse() {
        if (confirm("Начать заново сегодня?")) {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date-input').value = today;
            updateDate(today);
        }
    }

    function render() {
        const filter = document.getElementById('citySelect').value;
        const cont = document.getElementById('list-container');
        cont.innerHTML = "";
        data.forEach(g => {
            if(filter === 'all' || g.c === filter) {
                cont.innerHTML += `<div class="group-card">
                    <div class="city-tag">${g.c}</div>
                    <div class="group-name">${g.n}</div>
                    <div class="info-row"><span>📍</span>${g.a}</div>
                    <div class="info-row"><span>⏰</span>${g.t}</div>
                    ${g.p ? `<div class="info-row"><span>📞</span><a href="tel:${g.p}" class="phone-link">${g.p}</a></div>` : ''}
                </div>`;
            }
        });
    }

    window.onload = () => {
        const sel = document.getElementById('citySelect');
        const cities = ["all", ...new Set(data.map(x => x.c))].sort();
        cities.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.innerText = c === "all" ? "Все города и Онлайн" : c;
            sel.appendChild(opt);
        });
        let s = localStorage.getItem('aa_sober_v3') || new Date().toISOString().split('T')[0];
        document.getElementById('date-input').value = s;
        updateDate(s);
        showMotivation();
    };
</script>
</body>
</html>
